name: 发布车组查询网页

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 读取网页文件
        uses: actions/checkout@v4
      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: 打包网页
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: 发布网页
        id: deployment
        uses: actions/deploy-pages@v4
